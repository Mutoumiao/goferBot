[default]
identifier = "default"
description = "Default set of permissions for the application"
permissions = ["allow-get-sidecar-port", "allow-restart-sidecar", "allow-import-files"]

[[permission]]
identifier = "allow-get-sidecar-port"
description = "Allow getting the sidecar port"

[permission.commands]
allow = ["get_sidecar_port"]
deny = []

[[permission]]
identifier = "allow-restart-sidecar"
description = "Allow restarting the sidecar"

[permission.commands]
allow = ["restart_sidecar"]
deny = []

[[permission]]
identifier = "allow-import-files"
description = "Allow importing files into knowledge bases"

[permission.commands]
allow = ["import_files"]
deny = []
